<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>過去問演習 — 資格まとめ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    #page-content { display: none; }

    /* コントロール */
    .ctrl-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .ctrl-label {
      font-size: 0.82rem;
      color: var(--color-text-muted);
      white-space: nowrap;
    }

    /* 問題カード */
    .quiz-card {
      background: var(--color-white);
      border: 1px solid var(--color-border);
      padding: 1.8rem 2rem;
    }
    .quiz-meta {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .quiz-progress {
      font-size: 0.82rem;
      color: var(--color-text-muted);
      margin-left: auto;
    }
    .quiz-question {
      font-size: 1rem;
      line-height: 1.9;
      color: var(--color-text);
      margin-bottom: 1.4rem;
    }

    /* 選択肢 */
    .choices { display: flex; flex-direction: column; gap: 0.55rem; }
    .choice-btn {
      width: 100%;
      text-align: left;
      padding: 0.75rem 1rem;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      font-family: var(--font-primary);
      font-size: 0.93rem;
      color: var(--color-text);
      cursor: pointer;
      line-height: 1.7;
      transition: background 0.12s, border-color 0.12s;
    }
    .choice-btn:hover:not(:disabled) {
      background: var(--color-bg-alt);
      border-color: var(--color-primary-light);
    }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct {
      background: #e6f0ea;
      border-color: #2f7d5b;
      color: #1a5c40;
      font-weight: 500;
    }
    .choice-btn.wrong {
      background: #f3e4e1;
      border-color: #a83a2c;
      color: #7a2820;
    }
    .choice-btn.reveal {
      background: #e6f0ea;
      border-color: #2f7d5b;
      color: #1a5c40;
    }

    /* 解説 */
    .explanation {
      margin-top: 1.2rem;
      padding: 1rem 1.2rem;
      background: var(--color-bg-alt);
      border-left: 4px solid var(--color-primary);
      font-size: 0.9rem;
      line-height: 1.9;
      color: var(--color-text-light);
      display: none;
    }
    .explanation.show { display: block; }
    .explanation .law-ref {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }
    .result-label {
      display: inline-block;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 0.2em 0.7em;
      border-radius: 3px;
      margin-bottom: 0.5rem;
    }
    .result-label.ok  { background: #e6f0ea; color: #1a5c40; }
    .result-label.ng  { background: #f3e4e1; color: #7a2820; }

    /* ナビゲーション */
    .quiz-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.2rem;
      gap: 1rem;
    }
    .btn {
      padding: 0.6rem 1.4rem;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: var(--color-white);
      font-family: var(--font-primary);
      font-size: 0.9rem;
      color: var(--color-text);
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn:hover { background: var(--color-bg-alt); }
    .btn-primary {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: var(--color-white);
    }
    .btn-primary:hover { background: var(--color-primary-light); border-color: var(--color-primary-light); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    /* スコアボード */
    .score-board {
      text-align: center;
      padding: 2.5rem 1rem;
      background: var(--color-white);
      border: 1px solid var(--color-border);
    }
    .score-big {
      font-family: var(--font-accent);
      font-size: 3.5rem;
      font-weight: 500;
      color: var(--color-primary);
      line-height: 1.2;
    }
    .score-label { font-size: 0.9rem; color: var(--color-text-muted); margin-top: 0.3rem; }
    .score-breakdown {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 1.2rem 0;
      font-size: 0.9rem;
    }
    .score-ok  { color: #2f7d5b; font-weight: 500; }
    .score-ng  { color: #a83a2c; font-weight: 500; }

    /* ローディング */
    .state-msg { padding: 3rem 1rem; text-align: center; color: var(--color-text-muted); font-size: 0.95rem; }

    @media (max-width: 600px) {
      .quiz-card { padding: 1.2rem 1rem; }
      .quiz-nav { flex-direction: column; }
      .btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

      projectId:         "dev-smoke-308500",

  <div id="page-content">
  <header class="site-header">
    <div class="container">
      <div class="site-name">資格まとめ</div>
      <div class="site-role">宅地建物取引士（宅建）学習ノート</div>
    </div>
  </header>

  <nav class="site-nav">
    <div class="container">
      <ul class="nav-list">
        <li><a class="nav-link" href="docs/overview.html">試験概要</a></li>
        <li><a class="nav-link current" href="practice.html">過去問演習</a></li>
        <li><a class="nav-link" href="#">権利関係</a></li>
        <li><a class="nav-link" href="#">宅建業法</a></li>
        <li><a class="nav-link" href="#">法令上の制限</a></li>

  <main>
    <section class="section">
      <div class="container">
        <h2 class="section-title">過去問演習</h2>

        <!-- コントロール -->
        <div class="ctrl-row">
          <span class="ctrl-label">科目：</span>
          <div class="filter-chips" id="subjectFilter" style="margin:0">
            <button class="filter-chip current" data-subject="all">全科目</button>
            <button class="filter-chip" data-subject="宅建業法">宅建業法</button>
            <button class="filter-chip" data-subject="権利関係">権利関係</button>
            <button class="filter-chip" data-subject="法令上の制限">法令上の制限</button>
            <button class="filter-chip" data-subject="税・その他">税・その他</button>
          </div>
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">出題順：</span>
          <div class="filter-chips" id="modeFilter" style="margin:0">
            <button class="filter-chip current" data-mode="random">ランダム</button>
            <button class="filter-chip" data-mode="sequential">順番に</button>
          </div>
          <span class="ctrl-label" id="totalCount" style="margin-left:auto"></span>
          <button class="btn btn-primary" id="startBtn">演習スタート</button>
        </div>

        <!-- 問題エリア -->
        <div id="quizArea">
          <p class="state-msg">科目を選んで「演習スタート」を押してください。</p>
        </div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div>資格まとめ — 宅地建物取引士（宅建）学習ノート</div>
      <div class="disclaimer">問題文はAI生成によるオリジナルです。最新法令・正確な出題傾向は公式資料でご確認ください。</div>
    </div>
  </footer>
  </div><!-- /#page-content -->

  <script>
  (() => {
    // ── データ読み込み ──────────────────────────────────────
    const DATA_FILES = {
      '宅建業法':    'data/gyoho.json',
      '権利関係':    'data/kenri.json',
      '法令上の制限':'data/horei.json',
      '税・その他':  'data/zei.json',
    };

    let allQuestions = [];   // 読込済み全問
    let queue        = [];   // 演習キュー
    let current      = 0;   // 現在のインデックス
    let answered     = false;
    let score        = { ok: 0, ng: 0 };
    let currentSubject = 'all';
    let currentMode    = 'random';

    async function loadAll() {
      const results = await Promise.all(
        Object.values(DATA_FILES).map(f =>
          fetch(f).then(r => r.json()).catch(() => ({ questions: [] }))
        )
      );
      allQuestions = results.flatMap(d => d.questions || []);
      updateCount();
    }

    function updateCount() {
      const filtered = filterQuestions();
      document.getElementById('totalCount').textContent = `${filtered.length}問`;
    }

    function filterQuestions() {
      if (currentSubject === 'all') return allQuestions;
      return allQuestions.filter(q => q.subject === currentSubject);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── 演習開始 ────────────────────────────────────────────
    function startQuiz() {
      const base = filterQuestions();
      if (base.length === 0) {
        document.getElementById('quizArea').innerHTML =
          '<p class="state-msg">問題データが見つかりません。</p>';
        return;
      }
      queue   = currentMode === 'random' ? shuffle(base) : [...base];
      current = 0;
      score   = { ok: 0, ng: 0 };
      renderQuestion();
    }

    // ── 問題描画 ────────────────────────────────────────────
    function renderQuestion() {
      answered = false;
      if (current >= queue.length) { renderScore(); return; }

      const q   = queue[current];
      const idx = current + 1;
      const tot = queue.length;

      const diffColor = { '基本': 'badge-primary', '標準': 'badge-primary', '応用': 'badge-accent' };
      const dClass = diffColor[q.difficulty] || 'badge-primary';

      document.getElementById('quizArea').innerHTML = `
        <div class="quiz-card">
          <div class="quiz-meta">
            <span class="badge ${dClass}">${q.subject}</span>
            <span class="badge badge-primary">${q.topic}</span>
            <span class="badge ${dClass}">${q.difficulty}</span>
            <span class="quiz-progress">${idx} / ${tot} 問</span>
          </div>
          <p class="quiz-question">${escHtml(q.question)}</p>
          <div class="choices" id="choices">
            ${q.choices.map((c, i) => `
              <button class="choice-btn" data-idx="${i + 1}">${escHtml(c)}</button>
            `).join('')}
          </div>
          <div class="explanation" id="explanation"></div>
          <div class="quiz-nav">
            <button class="btn" id="prevBtn" ${current === 0 ? 'disabled' : ''}>← 前の問題</button>
            <button class="btn btn-primary" id="nextBtn" disabled>次の問題 →</button>
          </div>
        </div>
      `;

      // 選択肢クリック
      document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => handleAnswer(q, parseInt(btn.dataset.idx)));
      });

      document.getElementById('prevBtn').addEventListener('click', () => { current--; renderQuestion(); });
      document.getElementById('nextBtn').addEventListener('click', () => { current++; renderQuestion(); });
    }

    // ── 回答処理 ────────────────────────────────────────────
    function handleAnswer(q, chosen) {
      if (answered) return;
      answered = true;

      const isCorrect = chosen === q.answer;
      if (isCorrect) score.ok++; else score.ng++;

      // ボタンのスタイル変更
      document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.disabled = true;
        const idx = parseInt(btn.dataset.idx);
        if (idx === q.answer) btn.classList.add('correct');
        else if (idx === chosen && !isCorrect) btn.classList.add('wrong');
      });

      // 解説表示
      const exEl = document.getElementById('explanation');
      exEl.innerHTML = `
        <div class="result-label ${isCorrect ? 'ok' : 'ng'}">${isCorrect ? '✓ 正解' : '✗ 不正解'}</div>
        <div>${escHtml(q.explanation)}</div>
        ${q.law ? `<div class="law-ref">根拠：${escHtml(q.law)}</div>` : ''}
      `;
      exEl.classList.add('show');

      document.getElementById('nextBtn').disabled = false;
    }

    // ── スコア表示 ──────────────────────────────────────────
    function renderScore() {
      const total = score.ok + score.ng;
      const pct   = total ? Math.round(score.ok / total * 100) : 0;
      document.getElementById('quizArea').innerHTML = `
        <div class="score-board">
          <div class="score-big">${pct}<span style="font-size:1.5rem;color:var(--color-text-muted)">%</span></div>
          <div class="score-label">${total}問中 ${score.ok}問正解</div>
          <div class="score-breakdown">
            <span class="score-ok">✓ 正解 ${score.ok}問</span>
            <span class="score-ng">✗ 不正解 ${score.ng}問</span>
          </div>
          <button class="btn btn-primary" id="retryBtn" style="margin-top:0.5rem">もう一度やり直す</button>
        </div>
      `;
      document.getElementById('retryBtn').addEventListener('click', startQuiz);
    }

    // ── ユーティリティ ──────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── イベント登録 ────────────────────────────────────────
    document.getElementById('subjectFilter').addEventListener('click', e => {
      const btn = e.target.closest('[data-subject]');
      if (!btn) return;
      currentSubject = btn.dataset.subject;
      document.querySelectorAll('#subjectFilter .filter-chip').forEach(b => b.classList.remove('current'));
      btn.classList.add('current');
      updateCount();
    });

    document.getElementById('modeFilter').addEventListener('click', e => {
      const btn = e.target.closest('[data-mode]');
      if (!btn) return;
      currentMode = btn.dataset.mode;
      document.querySelectorAll('#modeFilter .filter-chip').forEach(b => b.classList.remove('current'));
      btn.classList.add('current');
    });

    document.getElementById('startBtn').addEventListener('click', startQuiz);

    // ── 初期化 ──────────────────────────────────────────────
    loadAll();
  })();
  </script>
</body>
