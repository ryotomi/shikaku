<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 48px 40px;
      width: 360px;
      text-align: center;
    }

    h1 {
      font-size: 1.4rem;
      color: #333;
      margin-bottom: 8px;
    }

    p.sub {
      color: #777;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    button#login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 1rem;
      color: #333;
      cursor: pointer;
      transition: background 0.15s;
    }

    button#login-btn:hover { background: #f0f0f0; }

    button#login-btn img {
      width: 20px;
      height: 20px;
    }

    #error {
      margin-top: 16px;
      color: #c00;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ログイン</h1>
    <p class="sub">Googleアカウントでサインインしてください</p>
    <button id="login-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      Googleでログイン
    </button>
    <p id="error"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyA23ZY-H2JPzdlG1Fm8bfLW34y9XEMldrU",
      authDomain:        "dev-smoke-308500.firebaseapp.com",
      projectId:         "dev-smoke-308500",
      storageBucket:     "dev-smoke-308500.firebasestorage.app",
      messagingSenderId: "787519016500",
      appId:             "1:787519016500:web:decc4d4a20145659f44461",
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    // すでにログイン済みならホームへ
    onAuthStateChanged(auth, user => {
      if (user) location.href = "index.html";
    });

    document.getElementById("login-btn").addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
        // onAuthStateChanged がリダイレクトを処理する
      } catch (err) {
        const el = document.getElementById("error");
        el.textContent = "ログインに失敗しました: " + err.message;
        el.style.display = "block";
      }
    });
  </script>
</body>
</html>
